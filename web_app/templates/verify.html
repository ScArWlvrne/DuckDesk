<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Verify Your Email</title>
</head>
<body>
  <h1>Verify Your Email</h1>
  <p>We sent a verification code to your email. Enter it below to complete signup.</p>

  <form action="" method="post">
    <label for="code">Verification Code:</label><br>
    <input type="text" id="code" name="code" maxlength="5" required><br><br>

    <button type="submit">Verify</button>
  </form>
</body>
</html>
